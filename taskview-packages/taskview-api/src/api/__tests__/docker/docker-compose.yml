services:
  db:
    image: postgres:17
    restart: "no"
    env_file:
      - .env.postgresql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tvdbuser -d taskviewdb"]
      interval: 3s
      timeout: 3s
      retries: 10

  migration:
    image: gimanhead/taskview-ce-db-migration:test
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.taskview

  api:
    image: gimanhead/taskview-ce-api-server:test
    restart: "no"
    ports:
      - "11401:1401"
    depends_on:
      migration:
        condition: service_completed_successfully
    env_file:
      - .env.taskview
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:1401/ || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
